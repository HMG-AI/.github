name: Reusable HMG Public Quality

on:
  workflow_call:
    inputs:
      base_sha:
        description: Full HMG-public base commit SHA
        required: true
        type: string
      head_sha:
        description: Full HMG-public candidate commit SHA
        required: true
        type: string
      head_ref:
        description: Pull-request head branch or merge-group ref
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: hmg-public-quality-${{ inputs.head_sha }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: public-export-quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Validate immutable inputs and repository
        shell: bash
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || '' }}
          EVENT_HEAD_REF: ${{ github.event.pull_request.head.ref || github.event.merge_group.head_ref || '' }}
          EVENT_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || '' }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ inputs.head_sha }}
          HEAD_REF: ${{ inputs.head_ref }}
          TARGET_REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          if [[ "${TARGET_REPOSITORY}" != "HMG-AI/HMG-public" ]]; then
            echo "::error::This quality profile only accepts HMG-AI/HMG-public"
            exit 2
          fi
          readonly sha_pattern='^[0-9a-f]{40}$'
          for sha_name in BASE_SHA HEAD_SHA; do
            sha_value="${!sha_name}"
            if [[ ! "${sha_value}" =~ ${sha_pattern} ]]; then
              echo "::error::${sha_name} must be a full lowercase commit SHA"
              exit 2
            fi
          done
          case "${EVENT_NAME}" in
            pull_request|merge_group)
              ;;
            *)
              echo "::error::HMG-public quality only accepts pull_request or merge_group"
              exit 2
              ;;
          esac
          if [[ "${BASE_SHA}" != "${EVENT_BASE_SHA}" || \
                "${HEAD_SHA}" != "${EVENT_HEAD_SHA}" || \
                "${HEAD_REF}" != "${EVENT_HEAD_REF}" ]]; then
            echo "::error::Reusable quality inputs do not match the immutable event payload"
            exit 2
          fi
          if [[ "${EVENT_NAME}" == "pull_request" && \
                "${HEAD_REF}" == release/hmg-public/v* && \
                "${EVENT_HEAD_REPOSITORY}" != "${TARGET_REPOSITORY}" ]]; then
            echo "::error::Automated promotion branches must belong to HMG-AI/HMG-public"
            exit 2
          fi

      - name: Check out the candidate with full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.head_sha }}
          fetch-depth: 0
          path: candidate
          persist-credentials: false

      - name: Classify governed promotion commits in the event range
        id: promotion
        shell: bash
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ inputs.head_sha }}
          HEAD_REF: ${{ inputs.head_ref }}
        run: |
          set -Eeuo pipefail
          if ! git -C candidate cat-file -e "${BASE_SHA}^{commit}" || \
             ! git -C candidate cat-file -e "${HEAD_SHA}^{commit}" || \
             [[ "$(git -C candidate rev-parse HEAD)" != "${HEAD_SHA}" ]]; then
            echo "::error::The event commits are not available in the checked-out repository"
            exit 2
          fi
          if [[ "${EVENT_NAME}" == "merge_group" ]] && \
             ! git -C candidate merge-base --is-ancestor "${BASE_SHA}" "${HEAD_SHA}"; then
            echo "::error::Merge-group head must descend from its immutable event base"
            exit 2
          fi

          range_commits="${RUNNER_TEMP}/hmg-public-event-range-commits.txt"
          hmg_commits="${RUNNER_TEMP}/hmg-public-event-hmg-commits.txt"
          git -C candidate rev-list --reverse "${BASE_SHA}..${HEAD_SHA}" > "${range_commits}"
          : > "${hmg_commits}"
          while IFS= read -r commit_sha; do
            parsed_trailers="$(
              git -C candidate show -s --format=%B "${commit_sha}" \
                | git interpret-trailers --parse
            )"
            if grep -q '^HMG-' <<<"${parsed_trailers}"; then
              printf '%s\n' "${commit_sha}" >> "${hmg_commits}"
            fi
          done < "${range_commits}"
          hmg_commit_count="$(wc -l < "${hmg_commits}")"

          is_promotion=false
          promotion_commit=''
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            if [[ "${HEAD_REF}" == release/hmg-public/v* ]]; then
              if ((hmg_commit_count > 1)) || \
                 ((hmg_commit_count == 1)) && \
                 [[ "$(tr -d '[:space:]' < "${hmg_commits}")" != "${HEAD_SHA}" ]]; then
                echo "::error::A release pull request must have exactly one possible promotion commit at HEAD"
                exit 2
              fi
              is_promotion=true
              promotion_commit="${HEAD_SHA}"
            elif ((hmg_commit_count != 0)); then
              echo "::error::HMG provenance trailers are forbidden outside the deterministic release branch"
              exit 2
            fi
          elif ((hmg_commit_count == 1)); then
            is_promotion=true
            promotion_commit="$(tr -d '[:space:]' < "${hmg_commits}")"
          elif ((hmg_commit_count > 1)); then
            echo "::error::A merge group may contain exactly one governed HMG promotion commit"
            exit 2
          fi
          echo "is_promotion=${is_promotion}" >> "${GITHUB_OUTPUT}"
          if [[ "${is_promotion}" == "true" ]]; then
            echo "commit_sha=${promotion_commit}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Protect target-owned governance during governed promotion
        if: steps.promotion.outputs.is_promotion == 'true'
        shell: bash
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ inputs.head_sha }}
          HEAD_REF: ${{ inputs.head_ref }}
          PROMOTION_COMMIT: ${{ steps.promotion.outputs.commit_sha }}
        run: |
          set -Eeuo pipefail
          release_tag="$(
            git -C candidate show -s --format=%B "${PROMOTION_COMMIT}" \
              | git interpret-trailers --parse \
              | sed -n 's/^HMG-Source-Tag: \(v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)$/\1/p'
          )"
          if [[ ! "${release_tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Promotion must declare one canonical stable source tag"
            exit 2
          fi
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            if [[ "${HEAD_REF}" != "release/hmg-public/${release_tag}" ]]; then
              echo "::error::Promotion branch must end in a canonical stable SemVer tag"
              exit 2
            fi
            if [[ "$(git -C candidate rev-parse 'HEAD^')" != "${BASE_SHA}" || \
                  "$(git -C candidate rev-list --count "${BASE_SHA}..${HEAD_SHA}")" != "1" ]]; then
              echo "::error::Automated promotion pull request must be exactly one commit on the event base"
              exit 2
            fi
          fi
          readonly expected_path="release-provenance/${release_tag}.json"
          protected_changes="$(
            git -C candidate diff --name-only "${BASE_SHA}" "${HEAD_SHA}" -- \
              .github \
              commitlint.config.mjs
          )"
          provenance_changes="$(
            git -C candidate diff --name-only "${BASE_SHA}" "${HEAD_SHA}" -- \
              release-provenance
          )"
          if [[ -n "${protected_changes}" ]]; then
            echo "::error::Automated promotion must preserve target-owned governance"
            printf '%s\n' "${protected_changes}"
            exit 2
          fi
          if [[ "${provenance_changes}" != "${expected_path}" || \
                ! -f "candidate/${expected_path}" || \
                -L "candidate/${expected_path}" ]]; then
            echo "::error::Automated promotion must preserve provenance history and add or replace only ${expected_path}"
            printf '%s\n' "${provenance_changes}"
            exit 2
          fi

      - name: Verify signed promotion provenance and final-tag absence
        if: steps.promotion.outputs.is_promotion == 'true'
        shell: bash
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ inputs.head_sha }}
          HEAD_REF: ${{ inputs.head_ref }}
          PROMOTION_COMMIT: ${{ steps.promotion.outputs.commit_sha }}
        run: |
          set -Eeuo pipefail
          readonly key_id_allowlist='ed25519-spki-sha256-10a79fee35f78fbe9542c7a9b639e564dd6c99c7068c7fb3b230084dca670fe2'
          trailer_file="${RUNNER_TEMP}/hmg-public-quality-trailers.txt"
          git -C candidate show -s --format=%B "${PROMOTION_COMMIT}" \
            | git interpret-trailers --parse > "${trailer_file}"
          expected_trailer_keys="${RUNNER_TEMP}/hmg-public-expected-trailer-keys.txt"
          actual_trailer_keys="${RUNNER_TEMP}/hmg-public-actual-trailer-keys.txt"
          printf '%s\n' \
            HMG-Asset-Set-SHA256 \
            HMG-Candidate-Tree \
            HMG-Provenance-Key-ID \
            HMG-Provenance-Signature-Ed25519 \
            HMG-Source-Repository \
            HMG-Source-SHA \
            HMG-Source-Tag \
            HMG-Workflow-Run \
            | LC_ALL=C sort > "${expected_trailer_keys}"
          sed -n 's/^\([^:][^:]*\): .*/\1/p' "${trailer_file}" \
            | LC_ALL=C sort > "${actual_trailer_keys}"
          if [[ "$(wc -l < "${trailer_file}")" != "8" ]] || \
             ! diff -u "${expected_trailer_keys}" "${actual_trailer_keys}"; then
            echo "::error::Promotion commit must contain exactly the eight governed provenance trailers"
            exit 2
          fi
          source_repository="$(sed -n 's/^HMG-Source-Repository: \(HMG-AI\/HMG\)$/\1/p' "${trailer_file}")"
          release_tag="$(sed -n 's/^HMG-Source-Tag: \(v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)$/\1/p' "${trailer_file}")"
          source_sha="$(sed -n 's/^HMG-Source-SHA: \([0-9a-f]\{40\}\)$/\1/p' "${trailer_file}")"
          workflow_run="$(sed -n 's#^HMG-Workflow-Run: \(https://github\.com/HMG-AI/HMG/actions/runs/[1-9][0-9]*\)$#\1#p' "${trailer_file}")"
          expected_digest="$(sed -n 's/^HMG-Asset-Set-SHA256: \([0-9a-f]\{64\}\)$/\1/p' "${trailer_file}")"
          candidate_tree="$(sed -n 's/^HMG-Candidate-Tree: \(sha1:[0-9a-f]\{40\}\|sha256:[0-9a-f]\{64\}\)$/\1/p' "${trailer_file}")"
          key_id="$(sed -n 's/^HMG-Provenance-Key-ID: \(ed25519-spki-sha256-[0-9a-f]\{64\}\)$/\1/p' "${trailer_file}")"
          provenance_signature="$(sed -n 's/^HMG-Provenance-Signature-Ed25519: \([A-Za-z0-9+/]\{86\}==\)$/\1/p' "${trailer_file}")"
          if [[ "${source_repository}" != "HMG-AI/HMG" || \
                ! "${release_tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ || \
                ! "${source_sha}" =~ ^[0-9a-f]{40}$ || \
                ! "${workflow_run}" =~ ^https://github\.com/HMG-AI/HMG/actions/runs/[1-9][0-9]*$ || \
                ! "${expected_digest}" =~ ^[0-9a-f]{64}$ || \
                ! "${candidate_tree}" =~ ^(sha1:[0-9a-f]{40}|sha256:[0-9a-f]{64})$ || \
                "${key_id}" != "${key_id_allowlist}" || \
                ! "${provenance_signature}" =~ ^[A-Za-z0-9+/]{86}==$ ]]; then
            echo "::error::Promotion commit contains an invalid governed provenance value"
            exit 2
          fi
          if [[ "${EVENT_NAME}" == "pull_request" && \
                "${HEAD_REF}" != "release/hmg-public/${release_tag}" ]]; then
            echo "::error::Promotion branch and signed source tag do not match"
            exit 2
          fi

          actual_candidate_tree="$(git -C candidate rev-parse --show-object-format):$(git -C candidate rev-parse "${HEAD_SHA}^{tree}")"
          if [[ "${actual_candidate_tree}" != "${candidate_tree}" ]]; then
            echo "::error::Candidate Git tree does not match the signed provenance"
            exit 2
          fi
          key_file="candidate/.github/provenance-keys/${key_id}.pem"
          if [[ ! -f "${key_file}" ]]; then
            echo "::error::The centrally reviewed provenance public key is missing"
            exit 2
          fi
          public_key_fingerprint="$(
            /usr/bin/openssl pkey \
              -pubin \
              -in "${key_file}" \
              -outform DER 2>/dev/null \
              | sha256sum \
              | cut -d ' ' -f1
          )"
          if [[ "${key_id}" != "ed25519-spki-sha256-${public_key_fingerprint}" ]]; then
            echo "::error::Promotion provenance public key does not match the reviewed key ID"
            exit 2
          fi
          provenance_statement="${RUNNER_TEMP}/hmg-public-provenance-v1.txt"
          provenance_signature_file="${RUNNER_TEMP}/hmg-public-provenance-v1.sig"
          printf '%s\n' \
            'HMG-PUBLIC-PROVENANCE-V1' \
            'source-repository=HMG-AI/HMG' \
            "source-tag=${release_tag}" \
            "source-sha=${source_sha}" \
            "workflow-run=${workflow_run}" \
            "asset-set-sha256=${expected_digest}" \
            "candidate-tree=${candidate_tree}" \
            'target-repository=HMG-AI/HMG-public' \
            'target-branch=main' \
            "key-id=${key_id}" \
            > "${provenance_statement}"
          if ! printf '%s' "${provenance_signature}" \
              | /usr/bin/openssl base64 -d -A -out "${provenance_signature_file}" || \
             [[ "$(wc -c < "${provenance_signature_file}")" != "64" ]]; then
            echo "::error::Promotion provenance signature is not canonical Ed25519"
            exit 2
          fi
          if ! /usr/bin/openssl pkeyutl \
              -verify \
              -pubin \
              -inkey "${key_file}" \
              -rawin \
              -in "${provenance_statement}" \
              -sigfile "${provenance_signature_file}"; then
            echo "::error::Promotion provenance signature is not trusted"
            exit 2
          fi
          metadata_file="candidate/release-provenance/${release_tag}.json"
          jq -e \
            --arg artifact "hmg-public-${release_tag#v}-${source_sha}" \
            --arg asset_set_sha256 "${expected_digest}" \
            --arg release_tag "${release_tag}" \
            --arg source_sha "${source_sha}" \
            --arg source_workflow_run "${workflow_run}" \
            --arg target_base_sha "${BASE_SHA}" \
            --arg version "${release_tag#v}" '
              keys == [
                "asset_count",
                "asset_set_sha256",
                "release_tag",
                "schema_version",
                "source_artifact",
                "source_repository",
                "source_sha",
                "source_workflow_run",
                "target_base_sha",
                "version"
              ] and
              .schema_version == "hmg-public-binary-release-provenance/v2" and
              .release_tag == $release_tag and
              .version == $version and
              .source_repository == "HMG-AI/HMG" and
              .source_sha == $source_sha and
              .source_workflow_run == $source_workflow_run and
              .source_artifact == $artifact and
              .asset_count == 17 and
              .asset_set_sha256 == $asset_set_sha256 and
              .target_base_sha == $target_base_sha
            ' "${metadata_file}" >/dev/null

          set +e
          final_tag_response="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/HMG-AI/HMG-public/git/ref/tags/${release_tag}" \
            2>&1)"
          final_tag_rc=$?
          set -e
          if ((final_tag_rc == 0)); then
            echo "::error::Final public tag ${release_tag} must not exist before merge"
            exit 2
          fi
          if ! grep -Eq '\(HTTP 404\)|HTTP/[0-9.]+ 404' <<<"${final_tag_response}"; then
            echo "::error::Unable to prove that final public tag ${release_tag} is absent"
            printf '%s\n' "${final_tag_response}"
            exit 2
          fi

      - name: Run centrally governed leak and boundary checks
        shell: bash
        run: |
          set -Eeuo pipefail
          readonly root="candidate"
          readonly deny_regex='one_shot_recall_engine|canonical_ingest|canonical_marker|recall_router|answer_materializer|intent_embed|intent_prototypes|topic_key|noise_gate|fusion_weight|adaptive_recall|memorize_admission|consolidation_runtime|observation_scoring|episode_planner|promotion_scoring|domain_lens_compiler|MemoryEngine|TieredStore|FjallStore'
          readonly secret_regex='sk-[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|gh[pousr]_[A-Za-z0-9]{30,}|AKIA[A-Z0-9]{16}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'

          deny_hits="$(grep -rnE "${deny_regex}" "${root}" \
            --include='*.rs' --include='*.toml' --include='*.yaml' \
            --include='*.yml' --include='*.json' --include='*.ts' \
            --include='*.py' --include='*.md' --include='*.sh' \
            --exclude='check-export-leak.sh' 2>/dev/null || true)"
          if [[ -n "${deny_hits}" ]]; then
            echo "::error::Private implementation identifiers found in public candidate"
            printf '%s\n' "${deny_hits}"
            exit 1
          fi

          secret_hits="$(grep -rnE "${secret_regex}" "${root}" \
            --exclude='check-export-leak.sh' --exclude-dir='.git' 2>/dev/null || true)"
          if [[ -n "${secret_hits}" ]]; then
            echo "::error::Credential-like material found in public candidate"
            printf '%s\n' "${secret_hits}"
            exit 1
          fi

          forbidden_paths="$(find "${root}" \
            -path "${root}/.git" -prune -o \
            \( -path '*/crates/hmg-*' -o -path '*/docs/adr' -o -path '*/docs/md/adr-classification.md' \) \
            -print 2>/dev/null || true)"
          if [[ -n "${forbidden_paths}" ]]; then
            echo "::error::Internal-only paths found in public candidate"
            printf '%s\n' "${forbidden_paths}"
            exit 1
          fi

          forbidden_dirs="$(find "${root}" -type d \
            \( -name target -o -name node_modules -o -name __pycache__ \) \
            -print -prune 2>/dev/null || true)"
          if [[ -n "${forbidden_dirs}" ]]; then
            echo "::error::Generated build directories found in public candidate"
            printf '%s\n' "${forbidden_dirs}"
            exit 1
          fi

          license_hits="$(grep -rnEi '\b(AGPL|GPL)(-[0-9.]+)?\b' "${root}" \
            --include='*.toml' --include='*.rs' --include='*.md' \
            --exclude='check-export-leak.sh' --exclude-dir='.git' 2>/dev/null \
            | grep -vE 'NOT GPL|not GPL|dual license|is licensed' || true)"
          if [[ -n "${license_hits}" ]]; then
            echo "::error::GPL/AGPL references require license review"
            printf '%s\n' "${license_hits}"
            exit 1
          fi

          email_hits="$(grep -rnE '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}' "${root}" \
            --include='*.rs' --include='*.toml' --include='*.ts' --include='*.py' \
            --include='*.sh' --exclude='check-export-leak.sh' --exclude-dir='.git' \
            2>/dev/null \
            | grep -vE '@(example|test|localhost|noreply)|users\.noreply|@hmg\.ai|@apache\.org|@github\.com|@hmg1ai\.com|@hmg2ai\.com' \
            || true)"
          if [[ -n "${email_hits}" ]]; then
            echo "::error::Possible customer or personal email addresses found"
            printf '%s\n' "${email_hits}"
            exit 1
          fi

          symlinks="$(find "${root}" -path "${root}/.git" -prune -o -type l -print)"
          if [[ -n "${symlinks}" ]]; then
            echo "::error::Symbolic links are not allowed in the generated public surface"
            printf '%s\n' "${symlinks}"
            exit 1
          fi
          gitlinks="$(git -C "${root}" ls-files --stage | awk '$1 == "160000" {print $4}')"
          if [[ -n "${gitlinks}" ]]; then
            echo "::error::Git submodules are not allowed in the generated public surface"
            printf '%s\n' "${gitlinks}"
            exit 1
          fi
          oversized="$(find "${root}" -path "${root}/.git" -prune -o -type f -size +20M -print)"
          if [[ -n "${oversized}" ]]; then
            echo "::error::Unexpected files larger than 20 MiB found in public candidate"
            printf '%s\n' "${oversized}"
            exit 1
          fi

      - name: Install the public Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Test the public Rust protocol and certification crates
        shell: bash
        run: |
          set -Eeuo pipefail
          cargo fmt --manifest-path candidate/protocol/Cargo.toml -- --check
          cargo fmt --manifest-path candidate/certification/Cargo.toml -- --check
          cargo check --locked --manifest-path candidate/protocol/Cargo.toml
          cargo check --locked --manifest-path candidate/certification/Cargo.toml
          cargo test --locked --manifest-path candidate/protocol/Cargo.toml
          cargo test --locked --manifest-path candidate/certification/Cargo.toml

      - name: Set up Node.js for the public SDK
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: candidate/sdk-ts/package-lock.json

      - name: Build the public TypeScript SDK from its lockfile
        shell: bash
        working-directory: candidate/sdk-ts
        run: |
          set -Eeuo pipefail
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build

      - name: Check public surface consistency
        shell: bash
        working-directory: candidate
        run: |
          set -Eeuo pipefail
          bash scripts/check-public-surface-drift.sh --manifest public-manifest.json

      - name: Self-test target-owned release policy scripts
        shell: bash
        working-directory: candidate
        run: |
          set -Eeuo pipefail
          readonly required_policy_scripts=(
            .github/scripts/classify-promoted-release.sh
            .github/scripts/publish-promoted-release.sh
            .github/scripts/test-classify-promoted-release.sh
            .github/scripts/test-publisher-policy.sh
          )
          for policy_script in "${required_policy_scripts[@]}"; do
            if [[ ! -f "${policy_script}" || -L "${policy_script}" ]]; then
              echo "::error::Required target-owned release policy script is missing or unsafe: ${policy_script}"
              exit 2
            fi
          done
          mapfile -d '' policy_scripts < <(
            find .github/scripts \
              -maxdepth 1 \
              -type f \
              -name '*.sh' \
              -print0 \
              | LC_ALL=C sort -z
          )
          if ((${#policy_scripts[@]} == 0)); then
            echo "::error::No target-owned release policy scripts were found"
            exit 2
          fi
          shellcheck "${policy_scripts[@]}"
          bash .github/scripts/test-classify-promoted-release.sh
          bash .github/scripts/test-publisher-policy.sh
