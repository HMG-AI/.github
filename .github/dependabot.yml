version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Shanghai
    labels:
      - "type: dependencies"
      - "area: governance"
    commit-message:
      prefix: "ci(deps)"

  - package-ecosystem: npm
    directory: /governance/commitlint
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: Asia/Shanghai
    labels:
      - "type: dependencies"
      - "area: governance"
    commit-message:
      prefix: "build(deps)"
