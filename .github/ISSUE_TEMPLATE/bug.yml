name: Bug report
description: Report a reproducible defect or regression
title: "[Bug]: "
labels:
  - "type: bug"
  - "status: triage"
projects:
  - "HMG-AI/1"
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use the repository Security tab or the organization security policy.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I removed credentials, private data, and customer information.
          required: true
        - label: This is not a security vulnerability.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken, and who or what is affected?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest deterministic sequence, sample, or repository that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.2.3 or full commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, architecture, runtime/toolchain, deployment mode
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Include relevant logs, stack traces, screenshots, or test output with secrets removed.
      render: shell
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Blocks all use or causes data/security risk
        - Blocks a major workflow; workaround unavailable
        - Degraded workflow; workaround available
        - Minor or cosmetic
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
