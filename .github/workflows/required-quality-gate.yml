name: Organization Required Quality Gate

on:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: organization-required-quality-${{ github.event.pull_request.number || github.event.merge_group.head_sha }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: quality-gate
    uses: HMG-AI/.github/.github/workflows/reusable-commitlint.yml@978d6d08d6bfc1e8a3662c1f9b0daab8bfa0e557
    with:
      base_sha: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
      head_sha: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
