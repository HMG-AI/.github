name: Reusable HMG Public Promotion

on:
  workflow_call:
    inputs:
      release_tag:
        description: Stable HMG release tag to promote, for example v1.7.6
        required: true
        type: string
      source_run_id:
        description: Successful Build & Release workflow run ID that produced the governed assets
        required: true
        type: string
    secrets:
      promotion_token:
        description: Fine-grained token scoped to HMG-public contents and pull requests
        required: true
      provenance_signing_key_pkcs8_b64:
        description: Base64 PKCS#8 Ed25519 key used only by the isolated signer job
        required: true

permissions:
  actions: read
  contents: read

concurrency:
  group: hmg-public-protected-promotion
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare-and-verify
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      asset_set_sha256: ${{ steps.assets.outputs.asset_set_sha256 }}
      candidate_tree: ${{ steps.bundle.outputs.candidate_tree }}
      source_run_url: ${{ steps.source-run.outputs.url }}
      source_sha: ${{ steps.source.outputs.sha }}
      target_base_sha: ${{ steps.target-base.outputs.sha }}
    steps:
      - name: Validate caller and release input
        shell: bash
        env:
          CALLER_EVENT: ${{ github.event_name }}
          CALLER_REF: ${{ github.ref }}
          CALLER_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          UPSTREAM_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          UPSTREAM_EVENT: ${{ github.event.workflow_run.event || '' }}
          UPSTREAM_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || '' }}
          UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id || '' }}
          UPSTREAM_WORKFLOW: ${{ github.event.workflow_run.name || '' }}
        run: |
          set -Eeuo pipefail
          if [[ "${CALLER_REPOSITORY}" != "HMG-AI/HMG" ]]; then
            echo "::error::This workflow only accepts releases from HMG-AI/HMG"
            exit 2
          fi
          if [[ "${CALLER_REF}" != "refs/heads/main" ]]; then
            echo "::error::The privileged caller must run from protected HMG main"
            exit 2
          fi
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::release_tag must be canonical stable SemVer"
            exit 2
          fi
          if [[ ! "${SOURCE_RUN_ID}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::source_run_id must identify a Build & Release run"
            exit 2
          fi
          case "${CALLER_EVENT}" in
            workflow_run)
              if [[ "${UPSTREAM_WORKFLOW}" != "Build & Release" || \
                    "${UPSTREAM_EVENT}" != "push" || \
                    "${UPSTREAM_CONCLUSION}" != "success" || \
                    "${UPSTREAM_HEAD_BRANCH}" != "${RELEASE_TAG}" || \
                    "${UPSTREAM_RUN_ID}" != "${SOURCE_RUN_ID}" ]]; then
                echo "::error::Promotion requires the exact successful Build & Release tag-push run"
                exit 2
              fi
              ;;
            workflow_dispatch)
              ;;
            *)
              echo "::error::Promotion only accepts workflow_run or trusted workflow_dispatch callers"
              exit 2
              ;;
          esac

      - name: Check out the reviewed HMG release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0
          path: source
          persist-credentials: false

      - name: Prove the tag belongs to protected main
        id: source
        shell: bash
        env:
          CALLER_EVENT: ${{ github.event_name }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          UPSTREAM_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
        run: |
          set -Eeuo pipefail
          source_sha="$(git -C source rev-parse HEAD)"
          tag_sha="$(git -C source rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          if [[ "${source_sha}" != "${tag_sha}" ]]; then
            echo "::error::Checkout SHA does not match ${RELEASE_TAG}"
            exit 2
          fi
          if [[ "${CALLER_EVENT}" == "workflow_run" && "${source_sha}" != "${UPSTREAM_HEAD_SHA}" ]]; then
            echo "::error::The release tag moved after the successful upstream workflow"
            exit 2
          fi
          git -C source fetch --no-tags origin main:refs/remotes/origin/main
          if ! git -C source merge-base --is-ancestor "${source_sha}" refs/remotes/origin/main; then
            echo "::error::${RELEASE_TAG} is not reachable from HMG-AI/HMG main"
            exit 2
          fi
          echo "sha=${source_sha}" >> "${GITHUB_OUTPUT}"

      - name: Verify the exact upstream Build and Release run
        id: source-run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -Eeuo pipefail
          run_json="${RUNNER_TEMP}/hmg-source-run.json"
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/HMG-AI/HMG/actions/runs/${SOURCE_RUN_ID}" \
            > "${run_json}"
          jq -e \
            --arg tag "${RELEASE_TAG}" \
            --arg sha "${SOURCE_SHA}" \
            --argjson run_id "${SOURCE_RUN_ID}" '
              .id == $run_id and
              .name == "Build & Release" and
              .path == ".github/workflows/build-release.yml" and
              .event == "push" and
              .status == "completed" and
              .conclusion == "success" and
              .head_branch == $tag and
              .head_sha == $sha and
              .html_url == ("https://github.com/HMG-AI/HMG/actions/runs/" + ($run_id | tostring))
            ' "${run_json}" >/dev/null
          echo "url=https://github.com/HMG-AI/HMG/actions/runs/${SOURCE_RUN_ID}" \
            >> "${GITHUB_OUTPUT}"

      - name: Check out the protected target base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: HMG-AI/HMG-public
          ref: main
          fetch-depth: 0
          path: candidate
          persist-credentials: false

      - name: Record the immutable target base
        id: target-base
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "sha=$(git -C candidate rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Install the HMG public Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Build the exact public candidate without credentials
        shell: bash
        env:
          HMG_PUBLIC_BASE_BRANCH: main
          HMG_RELEASE_TAG: ${{ inputs.release_tag }}
          HMG_SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -Eeuo pipefail
          bash source/scripts/sync-export.sh \
            --target-dir="${GITHUB_WORKSPACE}/candidate"

      - name: Enforce target-owned governance boundary
        shell: bash
        run: |
          set -Eeuo pipefail
          readonly protected_paths=(
            .github
            commitlint.config.mjs
          )
          governance_status="$(git -C candidate status --porcelain=v1 --untracked-files=all -- "${protected_paths[@]}")"
          if [[ -n "${governance_status}" ]]; then
            echo "::error::Public promotion attempted to modify target-owned governance files"
            printf '%s\n' "${governance_status}"
            exit 2
          fi
          for required_file in \
            .github/actionlint.yaml \
            .github/CODEOWNERS \
            .github/provenance-keys/ed25519-spki-sha256-10a79fee35f78fbe9542c7a9b639e564dd6c99c7068c7fb3b230084dca670fe2.pem \
            .github/scripts/classify-promoted-release.sh \
            .github/scripts/publish-promoted-release.sh \
            .github/scripts/test-classify-promoted-release.sh \
            .github/scripts/test-publisher-policy.sh \
            .github/workflows/commitlint.yml \
            .github/workflows/commitlint-approval.yml \
            .github/workflows/publish-promoted-release.yml \
            commitlint.config.mjs; do
            if [[ ! -f "candidate/${required_file}" || -L "candidate/${required_file}" ]]; then
              echo "::error::Required target-owned file is missing or unsafe: ${required_file}"
              exit 2
            fi
          done

      - name: Download and validate private release assets without target credentials
        id: assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -Eeuo pipefail
          readonly asset_dir="${RUNNER_TEMP}/hmg-source-release-assets"
          mkdir -p "${asset_dir}"
          gh release download "${RELEASE_TAG}" \
            --repo HMG-AI/HMG \
            --dir "${asset_dir}"

          readonly version="${RELEASE_TAG#v}"
          readonly expected_packages=(
            "hmg-${version}-aarch64-apple-darwin.tar.gz"
            "hmg-${version}-aarch64-pc-windows-msvc.zip"
            "hmg-${version}-aarch64-unknown-linux-gnu.tar.gz"
            "hmg-${version}-x86_64-apple-darwin.tar.gz"
            "hmg-${version}-x86_64-pc-windows-msvc.zip"
            "hmg-${version}-x86_64-unknown-linux-gnu.tar.gz"
          )
          readonly expected_assets=(
            "${expected_packages[@]}"
            SHA256SUMS.txt
            install.ps1
            install.sh
            version.json
          )
          expected_asset_list="$(printf '%s\n' "${expected_assets[@]}" | LC_ALL=C sort)"
          actual_asset_list="$(find "${asset_dir}" -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort)"
          if [[ "${actual_asset_list}" != "${expected_asset_list}" ]]; then
            echo "::error::Private release must contain exactly the ten governed assets"
            printf 'Expected:\n%s\nActual:\n%s\n' "${expected_asset_list}" "${actual_asset_list}"
            exit 2
          fi
          if [[ "$(jq -r '.tag' "${asset_dir}/version.json")" != "${RELEASE_TAG}" || \
                "$(jq -r '.version' "${asset_dir}/version.json")" != "${version}" ]]; then
            echo "::error::version.json does not match ${RELEASE_TAG}"
            exit 2
          fi
          if ! awk 'NF == 2 && length($1) == 64 && $1 !~ /[^0-9a-f]/ {next} {exit 1}' \
              "${asset_dir}/SHA256SUMS.txt"; then
            echo "::error::SHA256SUMS.txt must contain strict lowercase SHA-256 records"
            exit 2
          fi
          expected_package_list="$(printf '%s\n' "${expected_packages[@]}" | LC_ALL=C sort)"
          checksum_package_list="$(awk '{print $2}' "${asset_dir}/SHA256SUMS.txt" | sed 's/^\*//' | LC_ALL=C sort)"
          if [[ "${checksum_package_list}" != "${expected_package_list}" ]]; then
            echo "::error::SHA256SUMS.txt must cover exactly the six governed packages"
            exit 2
          fi
          if ! (cd "${asset_dir}" && sha256sum --check --strict SHA256SUMS.txt); then
            echo "::error::Private release package checksum verification failed"
            exit 2
          fi

          asset_manifest="$({
            for asset in "${asset_dir}"/*; do
              printf '%s  %s\n' \
                "$(sha256sum "${asset}" | cut -d ' ' -f1)" \
                "$(basename "${asset}")"
            done
          } | LC_ALL=C sort -k2)"
          printf '%s\n' "${asset_manifest}" > "${RUNNER_TEMP}/hmg-source-assets.sha256"
          asset_set_sha256="$(printf '%s\n' "${asset_manifest}" | sha256sum | cut -d ' ' -f1)"
          echo "asset_dir=${asset_dir}" >> "${GITHUB_OUTPUT}"
          echo "asset_set_sha256=${asset_set_sha256}" >> "${GITHUB_OUTPUT}"

      - name: Seal the candidate and assets for isolated jobs
        id: bundle
        shell: bash
        env:
          ASSET_DIR: ${{ steps.assets.outputs.asset_dir }}
        run: |
          set -Eeuo pipefail
          bundle_dir="${RUNNER_TEMP}/hmg-public-promotion-bundle"
          mkdir -p "${bundle_dir}"
          git -C candidate add -A
          tree_format="$(git -C candidate rev-parse --show-object-format)"
          tree_oid="$(git -C candidate write-tree)"
          candidate_tree="${tree_format}:${tree_oid}"
          if [[ ! "${candidate_tree}" =~ ^(sha1:[0-9a-f]{40}|sha256:[0-9a-f]{64})$ ]]; then
            echo "::error::Unsupported candidate tree object format"
            exit 2
          fi
          git -C candidate archive \
            --format=tar \
            --output="${bundle_dir}/candidate.tar" \
            "${tree_oid}"
          tar \
            --create \
            --file "${bundle_dir}/assets.tar" \
            --directory "${ASSET_DIR}" \
            .
          echo "candidate_tree=${candidate_tree}" >> "${GITHUB_OUTPUT}"

      - name: Upload the sealed promotion bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hmg-public-promotion-${{ github.run_id }}
          path: ${{ runner.temp }}/hmg-public-promotion-bundle
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

  sign:
    name: sign-provenance
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    outputs:
      key_id: ${{ steps.sign.outputs.key_id }}
      signature: ${{ steps.sign.outputs.signature }}
    steps:
      - name: Sign only the canonical validated statement
        id: sign
        shell: bash
        env:
          ASSET_SET_SHA256: ${{ needs.prepare.outputs.asset_set_sha256 }}
          CANDIDATE_TREE: ${{ needs.prepare.outputs.candidate_tree }}
          PRIVATE_KEY_PKCS8_B64: ${{ secrets.provenance_signing_key_pkcs8_b64 }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_RUN_URL: ${{ needs.prepare.outputs.source_run_url }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
        run: |
          set -Eeuo pipefail
          readonly key_id='ed25519-spki-sha256-10a79fee35f78fbe9542c7a9b639e564dd6c99c7068c7fb3b230084dca670fe2'
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ || \
                ! "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ || \
                ! "${SOURCE_RUN_URL}" =~ ^https://github\.com/HMG-AI/HMG/actions/runs/[1-9][0-9]*$ || \
                ! "${ASSET_SET_SHA256}" =~ ^[0-9a-f]{64}$ || \
                ! "${CANDIDATE_TREE}" =~ ^(sha1:[0-9a-f]{40}|sha256:[0-9a-f]{64})$ || \
                -z "${PRIVATE_KEY_PKCS8_B64}" ]]; then
            echo "::error::Signer received invalid or incomplete canonical inputs"
            exit 2
          fi

          key_file="${RUNNER_TEMP}/hmg-public-provenance-private.pk8"
          statement_file="${RUNNER_TEMP}/hmg-public-provenance-v1.txt"
          signature_file="${RUNNER_TEMP}/hmg-public-provenance-v1.sig"
          trap 'shred -u "${key_file}" "${statement_file}" "${signature_file}" 2>/dev/null || true' EXIT
          umask 077
          printf '%s' "${PRIVATE_KEY_PKCS8_B64}" \
            | /usr/bin/openssl base64 -d -A -out "${key_file}"
          /usr/bin/openssl pkey \
            -inform DER \
            -in "${key_file}" \
            -check \
            -noout >/dev/null
          fingerprint="$({
            /usr/bin/openssl pkey \
              -inform DER \
              -in "${key_file}" \
              -pubout \
              -outform DER
          } | sha256sum | cut -d ' ' -f1)"
          if [[ "${key_id}" != "ed25519-spki-sha256-${fingerprint}" ]]; then
            echo "::error::Configured signing key does not match the reviewed key ID"
            exit 2
          fi
          printf '%s\n' \
            'HMG-PUBLIC-PROVENANCE-V1' \
            'source-repository=HMG-AI/HMG' \
            "source-tag=${RELEASE_TAG}" \
            "source-sha=${SOURCE_SHA}" \
            "workflow-run=${SOURCE_RUN_URL}" \
            "asset-set-sha256=${ASSET_SET_SHA256}" \
            "candidate-tree=${CANDIDATE_TREE}" \
            'target-repository=HMG-AI/HMG-public' \
            'target-branch=main' \
            "key-id=${key_id}" \
            > "${statement_file}"
          /usr/bin/openssl pkeyutl \
            -sign \
            -rawin \
            -keyform DER \
            -inkey "${key_file}" \
            -in "${statement_file}" \
            -out "${signature_file}"
          if [[ "$(wc -c < "${signature_file}")" != "64" ]]; then
            echo "::error::Ed25519 signature must contain exactly 64 bytes"
            exit 2
          fi
          signature="$(/usr/bin/openssl base64 -A -in "${signature_file}")"
          if [[ ! "${signature}" =~ ^[A-Za-z0-9+/]{86}==$ ]]; then
            echo "::error::Ed25519 signature is not canonical base64"
            exit 2
          fi
          echo "key_id=${key_id}" >> "${GITHUB_OUTPUT}"
          echo "signature=${signature}" >> "${GITHUB_OUTPUT}"

  promote:
    name: protected-promotion
    needs:
      - prepare
      - sign
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out the current protected target base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: HMG-AI/HMG-public
          ref: main
          fetch-depth: 0
          path: candidate
          persist-credentials: false

      - name: Download the sealed promotion bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: hmg-public-promotion-${{ github.run_id }}
          path: ${{ runner.temp }}/hmg-public-promotion-bundle

      - name: Restore and independently verify signed bytes
        id: verified
        shell: bash
        env:
          ASSET_SET_SHA256: ${{ needs.prepare.outputs.asset_set_sha256 }}
          CANDIDATE_TREE: ${{ needs.prepare.outputs.candidate_tree }}
          KEY_ID: ${{ needs.sign.outputs.key_id }}
          PROVENANCE_SIGNATURE: ${{ needs.sign.outputs.signature }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_RUN_URL: ${{ needs.prepare.outputs.source_run_url }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          TARGET_BASE_SHA: ${{ needs.prepare.outputs.target_base_sha }}
        run: |
          set -Eeuo pipefail
          bundle_dir="${RUNNER_TEMP}/hmg-public-promotion-bundle"
          restored_dir="${RUNNER_TEMP}/hmg-public-candidate-restored"
          asset_dir="${RUNNER_TEMP}/hmg-public-assets-restored"
          statement_file="${RUNNER_TEMP}/hmg-public-provenance-v1.txt"
          signature_file="${RUNNER_TEMP}/hmg-public-provenance-v1.sig"
          mkdir -p "${restored_dir}" "${asset_dir}"
          for archive in candidate.tar assets.tar; do
            if tar --list --file "${bundle_dir}/${archive}" \
                | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
              echo "::error::Promotion artifact contains an unsafe archive path"
              exit 2
            fi
          done
          tar --extract --no-same-owner \
            --file "${bundle_dir}/candidate.tar" \
            --directory "${restored_dir}"
          tar --extract --no-same-owner \
            --file "${bundle_dir}/assets.tar" \
            --directory "${asset_dir}"

          current_base_sha="$(git -C candidate rev-parse HEAD)"
          if [[ "${current_base_sha}" != "${TARGET_BASE_SHA}" ]]; then
            echo "::error::HMG-public main changed while the promotion was being prepared; rerun from the new base"
            exit 2
          fi
          rsync -a --delete --exclude=.git/ "${restored_dir}/" candidate/
          git -C candidate add -A
          restored_tree="$(git -C candidate rev-parse --show-object-format):$(git -C candidate write-tree)"
          if [[ "${restored_tree}" != "${CANDIDATE_TREE}" ]]; then
            echo "::error::Restored candidate tree does not match the signed tree"
            exit 2
          fi

          readonly key_file="candidate/.github/provenance-keys/${KEY_ID}.pem"
          if [[ ! -f "${key_file}" || \
                "${KEY_ID}" != 'ed25519-spki-sha256-10a79fee35f78fbe9542c7a9b639e564dd6c99c7068c7fb3b230084dca670fe2' ]]; then
            echo "::error::Unknown or missing HMG public provenance key"
            exit 2
          fi
          fingerprint="$({
            /usr/bin/openssl pkey \
              -pubin \
              -in "${key_file}" \
              -outform DER
          } | sha256sum | cut -d ' ' -f1)"
          if [[ "${KEY_ID}" != "ed25519-spki-sha256-${fingerprint}" ]]; then
            echo "::error::Provenance key fingerprint does not match its reviewed key ID"
            exit 2
          fi
          printf '%s\n' \
            'HMG-PUBLIC-PROVENANCE-V1' \
            'source-repository=HMG-AI/HMG' \
            "source-tag=${RELEASE_TAG}" \
            "source-sha=${SOURCE_SHA}" \
            "workflow-run=${SOURCE_RUN_URL}" \
            "asset-set-sha256=${ASSET_SET_SHA256}" \
            "candidate-tree=${CANDIDATE_TREE}" \
            'target-repository=HMG-AI/HMG-public' \
            'target-branch=main' \
            "key-id=${KEY_ID}" \
            > "${statement_file}"
          if ! printf '%s' "${PROVENANCE_SIGNATURE}" \
              | /usr/bin/openssl base64 -d -A -out "${signature_file}" || \
             [[ "$(wc -c < "${signature_file}")" != "64" ]]; then
            echo "::error::Promotion signature is not canonical Ed25519"
            exit 2
          fi
          /usr/bin/openssl pkeyutl \
            -verify \
            -pubin \
            -inkey "${key_file}" \
            -rawin \
            -in "${statement_file}" \
            -sigfile "${signature_file}"

          expected_assets="${RUNNER_TEMP}/expected-assets.txt"
          actual_assets="${RUNNER_TEMP}/actual-assets.txt"
          asset_manifest="${RUNNER_TEMP}/restored-assets.sha256"
          version="${RELEASE_TAG#v}"
          printf '%s\n' \
            SHA256SUMS.txt \
            "hmg-${version}-aarch64-apple-darwin.tar.gz" \
            "hmg-${version}-aarch64-pc-windows-msvc.zip" \
            "hmg-${version}-aarch64-unknown-linux-gnu.tar.gz" \
            "hmg-${version}-x86_64-apple-darwin.tar.gz" \
            "hmg-${version}-x86_64-pc-windows-msvc.zip" \
            "hmg-${version}-x86_64-unknown-linux-gnu.tar.gz" \
            install.ps1 \
            install.sh \
            version.json \
            | LC_ALL=C sort > "${expected_assets}"
          find "${asset_dir}" -mindepth 1 -maxdepth 1 -type f -printf '%f\n' \
            | LC_ALL=C sort > "${actual_assets}"
          diff -u "${expected_assets}" "${actual_assets}"
          : > "${asset_manifest}"
          while IFS= read -r asset_name; do
            printf '%s  %s\n' \
              "$(sha256sum "${asset_dir}/${asset_name}" | cut -d ' ' -f1)" \
              "${asset_name}" >> "${asset_manifest}"
          done < "${expected_assets}"
          if [[ "$(sha256sum "${asset_manifest}" | cut -d ' ' -f1)" != "${ASSET_SET_SHA256}" ]]; then
            echo "::error::Restored assets do not match the signed aggregate digest"
            exit 2
          fi
          echo "asset_dir=${asset_dir}" >> "${GITHUB_OUTPUT}"

      - name: Reconcile staging transport and open the protected pull request
        id: promotion
        shell: bash
        working-directory: candidate
        env:
          ASSET_DIR: ${{ steps.verified.outputs.asset_dir }}
          ASSET_SET_SHA256: ${{ needs.prepare.outputs.asset_set_sha256 }}
          CANDIDATE_TREE: ${{ needs.prepare.outputs.candidate_tree }}
          GH_TOKEN: ${{ secrets.promotion_token }}
          KEY_ID: ${{ needs.sign.outputs.key_id }}
          PROVENANCE_SIGNATURE: ${{ needs.sign.outputs.signature }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_RUN_URL: ${{ needs.prepare.outputs.source_run_url }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          TARGET_BASE_SHA: ${{ needs.prepare.outputs.target_base_sha }}
          TARGET_REPOSITORY: HMG-AI/HMG-public
        run: |
          set -Eeuo pipefail
          test -n "${GH_TOKEN:-}" || { echo "::error::promotion_token is required"; exit 2; }
          readonly head_branch="release/hmg-public/${RELEASE_TAG}"
          readonly staging_tag="hmg-public-staging-${RELEASE_TAG}-${SOURCE_SHA}"

          other_prs="$(gh api \
            --paginate \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "/repos/${TARGET_REPOSITORY}/pulls?state=open&base=main&per_page=100" \
            --jq ".[] | select(.head.repo.full_name == \"${TARGET_REPOSITORY}\") | select(.head.ref | startswith(\"release/hmg-public/\")) | select(.head.ref != \"${head_branch}\") | .html_url")"
          if [[ -n "${other_prs}" ]]; then
            echo "::error::Another HMG public promotion is still open: ${other_prs}"
            exit 2
          fi
          pr_json="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "/repos/${TARGET_REPOSITORY}/pulls?state=all&head=HMG-AI:${head_branch}&base=main&per_page=20")"
          pr_count="$(jq 'length' <<<"${pr_json}")"
          if ((pr_count > 1)); then
            echo "::error::More than one pull request exists for ${head_branch}"
            exit 2
          fi
          pr_state="$(jq -r '.[0].state // empty' <<<"${pr_json}")"
          pr_merged="$(jq -r '.[0].merged_at // empty' <<<"${pr_json}")"
          pr_number="$(jq -r '.[0].number // empty' <<<"${pr_json}")"
          if [[ "${pr_state}" == "closed" ]]; then
            if [[ -n "${pr_merged}" ]]; then
              echo "::error::This promotion is already merged; recover the exact publisher run instead"
            else
              echo "::error::Promotion PR ${pr_number} was closed without merging; manual triage is required"
            fi
            exit 2
          fi

          set +e
          final_tag_response="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/${TARGET_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
            2>&1)"
          final_tag_rc=$?
          set -e
          if ((final_tag_rc == 0)); then
            echo "::error::Final public tag ${RELEASE_TAG} already exists before the promotion PR merged"
            exit 2
          fi
          if ! grep -Eq '\(HTTP 404\)|HTTP/[0-9.]+ 404' <<<"${final_tag_response}"; then
            echo "::error::Unable to prove that final public tag ${RELEASE_TAG} is absent"
            printf '%s\n' "${final_tag_response}"
            exit 2
          fi

          staging_releases="$(
            gh api --paginate \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/${TARGET_REPOSITORY}/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"${staging_tag}\")" \
              | jq -s '.'
          )"
          staging_count="$(jq 'length' <<<"${staging_releases}")"
          if ((staging_count == 0)); then
            staging_release="$(gh api --method POST \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/${TARGET_REPOSITORY}/releases" \
              -f "tag_name=${staging_tag}" \
              -f "target_commitish=main" \
              -f "name=Staging assets for HMG ${RELEASE_TAG}" \
              -f "body=Mutable staging transport for protected HMG public promotion ${RELEASE_TAG}; never consume as a final release." \
              -F draft=true \
              -F prerelease=true)"
          elif ((staging_count == 1)); then
            staging_release="$(jq '.[0]' <<<"${staging_releases}")"
          else
            echo "::error::More than one deterministic staging release exists"
            exit 2
          fi
          staging_release_id="$(jq -r '.id' <<<"${staging_release}")"
          jq -e \
            --arg tag "${staging_tag}" '
              .tag_name == $tag and
              .draft == true and
              .prerelease == true and
              (.id | type == "number")
            ' <<<"${staging_release}" >/dev/null

          version="${RELEASE_TAG#v}"
          expected_assets="${RUNNER_TEMP}/staging-expected-assets.txt"
          printf '%s\n' \
            SHA256SUMS.txt \
            "hmg-${version}-aarch64-apple-darwin.tar.gz" \
            "hmg-${version}-aarch64-pc-windows-msvc.zip" \
            "hmg-${version}-aarch64-unknown-linux-gnu.tar.gz" \
            "hmg-${version}-x86_64-apple-darwin.tar.gz" \
            "hmg-${version}-x86_64-pc-windows-msvc.zip" \
            "hmg-${version}-x86_64-unknown-linux-gnu.tar.gz" \
            install.ps1 \
            install.sh \
            version.json \
            | LC_ALL=C sort > "${expected_assets}"
          while IFS= read -r existing_name; do
            if ! grep -Fxq "${existing_name}" "${expected_assets}"; then
              echo "::error::Unexpected asset already exists in the staging release: ${existing_name}"
              exit 2
            fi
          done < <(jq -r '.assets[].name' <<<"${staging_release}")

          while IFS= read -r asset_name; do
            asset_path="${ASSET_DIR}/${asset_name}"
            remote_count="$(jq --arg name "${asset_name}" '[.assets[] | select(.name == $name)] | length' <<<"${staging_release}")"
            if ((remote_count == 0)); then
              gh release upload "${staging_tag}" "${asset_path}" \
                --repo "${TARGET_REPOSITORY}"
              continue
            fi
            if ((remote_count != 1)); then
              echo "::error::Duplicate staging asset name: ${asset_name}"
              exit 2
            fi
            asset_id="$(jq -r --arg name "${asset_name}" '.assets[] | select(.name == $name) | .id' <<<"${staging_release}")"
            asset_state="$(jq -r --arg name "${asset_name}" '.assets[] | select(.name == $name) | .state' <<<"${staging_release}")"
            if [[ "${asset_state}" == "starter" ]]; then
              gh api --method DELETE \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/${TARGET_REPOSITORY}/releases/assets/${asset_id}"
              gh release upload "${staging_tag}" "${asset_path}" \
                --repo "${TARGET_REPOSITORY}"
              continue
            elif [[ "${asset_state}" != "uploaded" ]]; then
              echo "::error::Staging asset has an unrecoverable state ${asset_state}: ${asset_name}"
              exit 2
            fi
            remote_asset="${RUNNER_TEMP}/existing-staging-${asset_id}"
            gh api \
              -H 'Accept: application/octet-stream' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/${TARGET_REPOSITORY}/releases/assets/${asset_id}" \
              > "${remote_asset}"
            if ! cmp -s "${asset_path}" "${remote_asset}"; then
              echo "::error::Existing staging asset conflicts with the signed source: ${asset_name}"
              exit 2
            fi
          done < "${expected_assets}"

          staging_release="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/${TARGET_REPOSITORY}/releases/${staging_release_id}")"
          actual_assets="${RUNNER_TEMP}/staging-actual-assets.txt"
          jq -r '.assets[].name' <<<"${staging_release}" | LC_ALL=C sort > "${actual_assets}"
          diff -u "${expected_assets}" "${actual_assets}"
          locked_asset_dir="${RUNNER_TEMP}/locked-staging-assets"
          locked_manifest="${RUNNER_TEMP}/locked-staging-assets.sha256"
          mkdir -p "${locked_asset_dir}"
          : > "${locked_manifest}"
          while IFS= read -r asset_name; do
            asset_id="$(jq -r --arg name "${asset_name}" '.assets[] | select(.name == $name) | .id' <<<"${staging_release}")"
            gh api \
              -H 'Accept: application/octet-stream' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/${TARGET_REPOSITORY}/releases/assets/${asset_id}" \
              > "${locked_asset_dir}/${asset_name}"
            printf '%s  %s\n' \
              "$(sha256sum "${locked_asset_dir}/${asset_name}" | cut -d ' ' -f1)" \
              "${asset_name}" >> "${locked_manifest}"
          done < "${expected_assets}"
          if [[ "$(sha256sum "${locked_manifest}" | cut -d ' ' -f1)" != "${ASSET_SET_SHA256}" ]]; then
            echo "::error::Staging release bytes do not match the signed aggregate digest"
            exit 2
          fi

          git config user.name 'HMG Release Automation'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          printf -v commit_body '%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s' \
            'HMG-Source-Repository: HMG-AI/HMG' \
            "HMG-Source-Tag: ${RELEASE_TAG}" \
            "HMG-Source-SHA: ${SOURCE_SHA}" \
            "HMG-Workflow-Run: ${SOURCE_RUN_URL}" \
            "HMG-Asset-Set-SHA256: ${ASSET_SET_SHA256}" \
            "HMG-Candidate-Tree: ${CANDIDATE_TREE}" \
            "HMG-Provenance-Key-ID: ${KEY_ID}" \
            "HMG-Provenance-Signature-Ed25519: ${PROVENANCE_SIGNATURE}"
          expected_message="${RUNNER_TEMP}/expected-promotion-message.txt"
          printf 'chore(public): promote HMG %s\n\n%s\n' \
            "${RELEASE_TAG}" "${commit_body}" > "${expected_message}"
          git add -A

          remote_oid="$(git ls-remote origin "refs/heads/${head_branch}" | cut -f1)"
          push_required=true
          if [[ -n "${remote_oid}" ]]; then
            git fetch --no-tags origin \
              "refs/heads/${head_branch}:refs/remotes/origin/hmg-public-promotion"
            remote_tree="$(git rev-parse --show-object-format):$(git rev-parse 'refs/remotes/origin/hmg-public-promotion^{tree}')"
            remote_parent="$(git rev-parse refs/remotes/origin/hmg-public-promotion^)"
            git show -s --format=%B refs/remotes/origin/hmg-public-promotion \
              > "${RUNNER_TEMP}/remote-promotion-message.txt"
            if [[ "${remote_tree}" == "${CANDIDATE_TREE}" && \
                  "${remote_parent}" == "${TARGET_BASE_SHA}" ]] && \
               cmp -s "${expected_message}" "${RUNNER_TEMP}/remote-promotion-message.txt"; then
              candidate_sha="${remote_oid}"
              push_required=false
            else
              echo "::notice::Refreshing the deterministic promotion branch from the current protected base"
            fi
          fi
          if [[ "${push_required}" == "true" ]]; then
            git commit \
              -m "chore(public): promote HMG ${RELEASE_TAG}" \
              -m "${commit_body}"
            candidate_sha="$(git rev-parse HEAD)"
            committed_tree="$(git rev-parse --show-object-format):$(git rev-parse 'HEAD^{tree}')"
            if [[ "${committed_tree}" != "${CANDIDATE_TREE}" ]]; then
              echo "::error::Promotion commit tree changed after provenance signing"
              exit 2
            fi
            gh auth setup-git
            git push \
              --force-with-lease="refs/heads/${head_branch}:${remote_oid}" \
              origin "HEAD:refs/heads/${head_branch}"
          fi

          pr_title="chore(public): promote HMG ${RELEASE_TAG}"
          printf -v pr_body '%s\n\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n\n%s' \
            'Automated protected promotion from the reviewed HMG release.' \
            "- Source repository: \`HMG-AI/HMG\`" \
            "- Source tag: \`${RELEASE_TAG}\`" \
            "- Source SHA: \`${SOURCE_SHA}\`" \
            "- Source Build & Release run: ${SOURCE_RUN_URL}" \
            "- Candidate tree: \`${CANDIDATE_TREE}\`" \
            "- Draft asset set SHA-256: \`${ASSET_SET_SHA256}\`" \
            "- Provenance key: \`${KEY_ID}\`" \
            'This pull request must pass organization and HMG-public gates and receive an eligible human CODEOWNER approval. Automation has no bypass or approval authority.'
          if [[ "${pr_state}" == "open" ]]; then
            if [[ "${push_required}" == "true" ]]; then
              gh pr edit "${pr_number}" \
                --repo "${TARGET_REPOSITORY}" \
                --title "${pr_title}" \
                --body "${pr_body}"
            fi
          else
            pr_url="$(gh pr create \
              --repo "${TARGET_REPOSITORY}" \
              --base main \
              --head "${head_branch}" \
              --title "${pr_title}" \
              --body "${pr_body}")"
            pr_number="${pr_url##*/}"
          fi
          gh pr merge "${pr_number}" \
            --repo "${TARGET_REPOSITORY}" \
            --auto \
            --rebase \
            --match-head-commit "${candidate_sha}"

          pr_url="https://github.com/${TARGET_REPOSITORY}/pull/${pr_number}"
          echo "pr_url=${pr_url}" >> "${GITHUB_OUTPUT}"
          {
            echo '### HMG public promotion'
            echo
            echo '- Status: waiting for required gates and human CODEOWNER approval'
            echo "- Pull request: ${pr_url}"
            echo "- Source: HMG-AI/HMG@${SOURCE_SHA} (${RELEASE_TAG})"
            echo "- Candidate: ${candidate_sha}"
            echo "- Signed tree: ${CANDIDATE_TREE}"
          } >> "${GITHUB_STEP_SUMMARY}"
