name: Good pull request workflow

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        runner: [ubuntu-24.04]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Treat event data as data
        env:
          REQUESTED_LABEL: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$REQUESTED_LABEL"
